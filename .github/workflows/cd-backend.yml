## Build the docker image
## Push to docker image to docker hub
## SSH into our VM and start the new image

name: backend deployment pipeline

on:
    push:
        branches: [ main ]
    
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v3

            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}
            
            - name: Build and push
              uses: docker/build-push-action@v3
              with:
                context: .
                file: ./docker/Dockerfile.backend
                push: true
                tags: hemeshkanyal/todo-app-backend:${{ github.sha }}
                build-args: |
                    DATABASE_URL=${{ secrets.DATABASE_URL }}
    
            - name: Deploy to VM
              run: |
                echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
                chmod 600 ~/ssh_key

                mkdir -p ~/.ssh
                echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

                ssh -i ~/ssh_key ubuntu@18.138.229.30 << 'EOF'
                  docker stop user_backend && docker run --name user_backend -d -p 8080:8080 100xdevs/todo-app-backend:${{ github.sha }}
                EOF